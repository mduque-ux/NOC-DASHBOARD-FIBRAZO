<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NOC Dashboard - Fibrazo</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ESTILOS SIMPLIFICADOS PARA ALTO RENDIMIENTO */
        :root{--g:#1DB954;--bk:#0D0D0D;--bg:#F2F3F5;--sf:#fff;--bd:#E8E9EC;--t1:#0D0D0D;--t2:#555E6B}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);margin:0;padding:20px}
        .wrap{max-width:1100px;margin:0 auto}
        .hdr{background:var(--bk);color:#fff;padding:20px;border-radius:16px;display:flex;justify-content:space-between;margin-bottom:15px}
        .kgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:15px}
        .kpi{background:var(--sf);padding:15px;border-radius:12px;border-top:4px solid var(--kc);box-shadow:0 2px 5px rgba(0,0,0,0.05)}
        .kpi-v{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;margin:5px 0}
        .card{background:var(--sf);border-radius:12px;border:1px solid var(--bd);padding:15px;margin-bottom:15px}
        .tbl{width:100%;border-collapse:collapse;font-size:12px}
        .tbl th{text-align:left;color:var(--t2);padding:8px;border-bottom:1px solid var(--bd)}
        .tbl td{padding:8px;border-bottom:1px solid #eee}
        .tab-nav{display:flex;gap:10px;margin-bottom:15px}
        .tab-btn{padding:8px 20px;border-radius:8px;border:none;cursor:pointer;background:var(--sf);font-weight:600}
        .tab-btn.active{background:var(--bk);color:#fff}
        .tab-panel{display:none} .tab-panel.active{display:block}
    </style>
</head>
<body>

<div class="wrap">
    <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('dash')">Dashboard NOC</button>
        <button class="tab-btn" onclick="switchTab('turno')">Entrega de Turno</button>
    </div>

    <div id="panel-dash" class="tab-panel active">
        <div class="hdr">
            <div><b style="font-size:18px">FIBRA<span>ZO</span> — NOC</b><br><small>Monitoreo OdooBot & Calendario</small></div>
            <div id="liveClock" style="text-align:right;font-weight:600">--:--:--</div>
        </div>

        <div class="kgrid">
            <div class="kpi" style="--kc:#EF9F27"><div>TICKETS ODOO</div><div class="kpi-v" id="val-odoo">--</div></div>
            <div class="kpi" style="--kc:#EF4444"><div>TV CAÍDOS</div><div class="kpi-v">4</div></div>
            <div class="kpi" style="--kc:#EF4444"><div>BITNINJA</div><div class="kpi-v">2</div></div>
            <div class="kpi" style="--kc:#1DB954"><div>MOPS HOY</div><div class="kpi-v" id="val-mops">0</div></div>
            <div class="kpi" style="--kc:#3B82F6"><div>LIBERTY</div><div class="kpi-v">1</div></div>
        </div>

        <div class="card">
            <h3>Tickets Reportados por OdooBot (Hoy)</h3>
            <table class="tbl" id="ticketTable">
                <thead><tr><th>ID</th><th>Evento / Sitio</th><th>País</th><th>Estado</th></tr></thead>
                <tbody><tr><td colspan="4">Cargando datos desde Gmail...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // URL de tu Google Sheet (Publicada como CSV)
    // IMPORTANTE: Aquí debes pegar el enlace que sacaste de "Publicar en la Web"
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS1CyYTwmNW8H1Ri9UT6jt69SZ1d_WzwMHkxRmuwPydhZon2ANEggmTPY/pub?output=csv";

    function switchTab(id){
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.getElementById('panel-'+id).classList.add('active');
    }

    async function fetchData() {
        try {
            const res = await fetch(SHEET_URL);
            const text = await res.text();
            const rows = text.split('\n').map(r => r.split(','));
            
            const total = rows.length - 1;
            document.getElementById('val-odoo').textContent = total > 0 ? total : "0";

            const tbody = document.querySelector('#ticketTable tbody');
            tbody.innerHTML = "";
            
            // Llenar tabla con datos de OdooBot
            for(let i=1; i < rows.length; i++) {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td><b>${rows[i][0]}</b></td><td>${rows[i][1]}</td><td>${rows[i][2]}</td><td>${rows[i][3]}</td>`;
                tbody.appendChild(tr);
            }
        } catch (e) { console.error("Error cargando datos"); }
    }

    setInterval(() => {
        document.getElementById('liveClock').textContent = new Date().toLocaleTimeString();
    }, 1000);

    fetchData(); // Carga inicial
</script>
</body>
</html>Integración final OdooBot + Gmail
