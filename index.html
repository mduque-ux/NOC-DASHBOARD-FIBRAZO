</div>

    <script>
        // URL de tu Google Sheet (CSV de OdooBot)
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS1CyYTwmNW8H1Ri9UT6jt69SZ1d_WzwMHkxRmuwPydhZon2ANEggmTPY/pub?output=csv";

        // Navegación de pestañas
        function switchTab(id) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            const panel = document.getElementById('panel-' + id);
            if (panel) panel.classList.add('active');
            
            // Buscar el botón y activarlo
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => {
                if(btn.getAttribute('onclick').includes(id)) {
                    btn.classList.add('active');
                }
            });
        }

        // Carga de datos desde OdooBot
        async function fetchData() {
            try {
                const res = await fetch(SHEET_URL);
                const text = await res.text();
                const rows = text.split('\n').map(r => r.split(',')).filter(row => row[0].trim() !== "");
                
                const total = Math.max(0, rows.length - 1);
                document.getElementById('val-odoo').textContent = total;

                const tbody = document.querySelector('#ticketTable tbody');
                if(tbody) {
                    tbody.innerHTML = "";
                    for(let i=1; i < rows.length; i++) {
                        const tr = document.createElement('tr');
                        const id = rows[i][0].replace(/"/g, "");
                        const evento = rows[i][1].replace(/"/g, "");
                        const pais = rows[i][2].replace(/"/g, "");
                        const estado = rows[i][3].replace(/"/g, "");
                        tr.innerHTML = `<td><b>${id}</b></td><td>${evento}</td><td>${pais}</td><td>${estado}</td>`;
                        tbody.appendChild(tr);
                    }
                }
            } catch (e) { console.error("Error en fetchData:", e); }
        }

        // Funciones de Entrega de Turno
        function addFila(tipo) {
            const cont = document.getElementById('lista-' + tipo);
            if (!cont) return;
            const div = document.createElement('div');
            div.className = 'fila-incidente';
            div.style.setProperty('--kc', tipo === 'masivas' ? '#EF4444' : '#F59E0B');
            div.innerHTML = `<input type="text" class="fii" placeholder="Sitio" style="width:100%"><input type="text" class="fii" placeholder="# ID" style="width:60px"><button onclick="this.parentElement.remove()" style="border:none;background:none;cursor:pointer;">✕</button>`;
            cont.appendChild(div);
        }

        function addPendiente() {
            const cont = document.getElementById('lista-pendientes');
            if (!cont) return;
            const div = document.createElement('div');
            div.style = "display:flex; gap:8px; margin-bottom:8px; align-items:center;";
            div.innerHTML = `<input type="checkbox"> <input type="text" class="fii" style="flex:1" placeholder="Tarea pendiente...">`;
            cont.appendChild(div);
        }

        function setSt(msg) {
            const area = document.getElementById('desc-ent');
            if (area) area.value = `[ESTADO ${msg.toUpperCase()}] ` + area.value;
        }

        // Reloj y arranque
        setInterval(() => {
            const clock = document.getElementById('liveClock');
            if(clock) clock.textContent = new Date().toLocaleTimeString();
        }, 1000);

        document.addEventListener('DOMContentLoaded', fetchData);
        fetchData();
    </script>
</body>
</html>
