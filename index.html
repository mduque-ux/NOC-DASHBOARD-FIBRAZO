<script>
    // URL de tu Google Sheet (CSV de OdooBot)
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS1CyYTwmNW8H1Ri9UT6jt69SZ1d_WzwMHkxRmuwPydhZon2ANEggmTPY/pub?output=csv";

    // Navegación de pestañas (Corregida para evitar errores de 'event')
    function switchTab(id) {
        // Ocultar todos los paneles
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        // Quitar estado activo de todos los botones
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        // Activar el panel seleccionado
        const panel = document.getElementById('panel-' + id);
        if (panel) panel.classList.add('active');
        
        // Activar el botón que lanzó el evento
        if (window.event) {
            window.event.currentTarget.classList.add('active');
        }
    }

    // Carga de datos desde OdooBot con limpieza de caracteres
    async function fetchData() {
        try {
            const res = await fetch(SHEET_URL);
            const text = await res.text();
            // Filtramos filas vacías para que el conteo sea exacto
            const rows = text.split('\n')
                             .map(r => r.split(','))
                             .filter(row => row[0].trim() !== "");
            
            const total = rows.length - 1;
            const valOdoo = document.getElementById('val-odoo');
            if(valOdoo) valOdoo.textContent = total > 0 ? total : "0";

            const tbody = document.querySelector('#ticketTable tbody');
            if(tbody) {
                tbody.innerHTML = "";
                for(let i=1; i < rows.length; i++) {
                    const tr = document.createElement('tr');
                    // Limpiamos comillas que a veces pone Google Sheets en el CSV
                    const id = rows[i][0].replace(/"/g, "");
                    const evento = rows[i][1].replace(/"/g, "");
                    const pais = rows[i][2].replace(/"/g, "");
                    const estado = rows[i][3].replace(/"/g, "");
                    
                    tr.innerHTML = `<td><b>${id}</b></td><td>${evento}</td><td>${pais}</td><td>${estado}</td>`;
                    tbody.appendChild(tr);
                }
            }
        } catch (e) { 
            console.error("Error cargando datos de OdooBot:", e); 
        }
    }

    // Funciones dinámicas de Entrega de Turno
    function addFila(tipo) {
        const cont = document.getElementById('lista-' + tipo);
        if (!cont) return;
        
        const div = document.createElement('div');
        div.className = 'fila-incidente';
        div.style.setProperty('--kc', tipo === 'masivas' ? '#EF4444' : '#F59E0B');
        div.innerHTML = `
            <input type="text" class="fii" placeholder="Sitio/Nodo" style="width:100%">
            <input type="text" class="fii" placeholder="# ID" style="width:60px">
            <button onclick="this.parentElement.remove()" style="border:none;background:none;cursor:pointer;font-weight:bold;color:#EF4444;">✕</button>
        `;
        cont.appendChild(div);
        // Pequeño scroll automático para ver la nueva fila
        div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function addPendiente() {
        const cont = document.getElementById('lista-pendientes');
        if (!cont) return;
        
        const div = document.createElement('div');
        div.style = "display:flex; gap:8px; margin-bottom:8px; align-items:center;";
        div.innerHTML = `
            <input type="checkbox" style="cursor:pointer"> 
            <input type="text" class="fii" style="flex:1" placeholder="Tarea pendiente para el relevo...">
        `;
        cont.appendChild(div);
    }

    function setSt(msg) {
        const area = document.getElementById('desc-ent');
        if (area) {
            const timestamp = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            area.value = `[${timestamp} - ESTADO ${msg.toUpperCase()}] ` + area.value;
        }
    }

    // Reloj en tiempo real
    setInterval(() => {
        const clock = document.getElementById('liveClock');
        if(clock) clock.textContent = new Date().toLocaleTimeString();
    }, 1000);

    // Ejecución inicial
    document.addEventListener('DOMContentLoaded', () => {
        fetchData();
        // Recargar datos automáticamente cada 5 minutos sin refrescar la página
        setInterval(fetchData, 300000); 
    });
</script>
