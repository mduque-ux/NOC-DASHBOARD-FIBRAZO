<script>
    // URL de tu Google Sheet (CSV de OdooBot)
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS1CyYTwmNW8H1Ri9UT6jt69SZ1d_WzwMHkxRmuwPydhZon2ANEggmTPY/pub?output=csv";

    // Navegación de pestañas mejorada
    function switchTab(id) {
        // 1. Ocultar todos los paneles
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        // 2. Quitar clase active de todos los botones
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        // 3. Mostrar el panel actual
        const panel = document.getElementById('panel-' + id);
        if (panel) panel.classList.add('active');
        
        // 4. Marcar el botón correcto como activo (buscando por el atributo data-tab o el texto)
        // Usamos una lógica más segura que no depende de 'event'
        const buttons = document.querySelectorAll('.tab-btn');
        buttons.forEach(btn => {
            if(btn.getAttribute('onclick').includes(id)) {
                btn.classList.add('active');
            }
        });
    }

    // Carga de datos desde OdooBot con limpieza profunda
    async function fetchData() {
        try {
            const res = await fetch(SHEET_URL);
            if (!res.ok) throw new Error('No se pudo conectar con la hoja');
            
            const text = await res.text();
            // Filtramos filas que realmente tengan datos
            const rows = text.split('\n')
                             .map(r => r.split(','))
                             .filter(row => row.length > 1 && row[0].trim() !== "");
            
            // Conteo de tickets (filas menos encabezado)
            const total = Math.max(0, rows.length - 1);
            const valOdoo = document.getElementById('val-odoo');
            if(valOdoo) valOdoo.textContent = total;

            const tbody = document.querySelector('#ticketTable tbody');
            if(tbody) {
                tbody.innerHTML = "";
                if(total === 0) {
                    tbody.innerHTML = "<tr><td colspan='4' style='text-align:center'>No hay tickets activos reportados.</td></tr>";
                } else {
                    for(let i=1; i < rows.length; i++) {
                        const tr = document.createElement('tr');
                        // Limpieza de comillas y espacios
                        const id = (rows[i][0] || "").replace(/"/g, "").trim();
                        const evento = (rows[i][1] || "").replace(/"/g, "").trim();
                        const pais = (rows[i][2] || "").replace(/"/g, "").trim();
                        const estado = (rows[i][3] || "").replace(/"/g, "").trim();
                        
                        tr.innerHTML = `<td><b>${id}</b></td><td>${evento}</td><td>${pais}</td><td>${estado}</td>`;
                        tbody.appendChild(tr);
                    }
                }
            }
        } catch (e) { 
            console.error("Error en fetchData:", e); 
        }
    }

    // Funciones dinámicas de Entrega de Turno
    function addFila(tipo) {
        const cont = document.getElementById('lista-' + tipo);
        if (!cont) return;
        
        const div = document.createElement('div');
        div.className = 'fila-incidente';
        div.style.setProperty('--kc', tipo === 'masivas' ? '#EF4444' : '#F59E0B');
        div.innerHTML = `
            <input type="text" class="fii" placeholder="Sitio/Nodo" style="width:100%">
            <input type="text" class="fii" placeholder="# ID" style="width:60px">
            <button onclick="this.parentElement.remove()" style="border:none;background:none;cursor:pointer;font-weight:bold;color:#EF4444;font-size:16px;">✕</button>
        `;
        cont.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function addPendiente() {
        const cont = document.getElementById('lista-pendientes');
        if (!cont) return;
        
        const div = document.createElement('div');
        div.style = "display:flex; gap:8px; margin-bottom:8px; align-items:center;";
        div.innerHTML = `
            <input type="checkbox" style="width:18px; height:18px; cursor:pointer"> 
            <input type="text" class="fii" style="flex:1" placeholder="Nueva tarea pendiente...">
        `;
        cont.appendChild(div);
    }

    function setSt(msg) {
        const area = document.getElementById('desc-ent');
        if (area) {
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            area.value = `[${time} - ${msg.toUpperCase()}] ` + area.value;
            area.focus();
        }
    }

    // Reloj y actualización automática
    setInterval(() => {
        const clock = document.getElementById('liveClock');
        if(clock) clock.textContent = new Date().toLocaleTimeString();
    }, 1000);

    // Carga inicial al estar listo el DOM
    document.addEventListener('DOMContentLoaded', () => {
        fetchData();
        // Sincronizar cada 5 minutos
        setInterval(fetchData, 300000); 
    });
</script>
