<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Dashboard — Fibrazo V5</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        /* Estilos base existentes */
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--g:#1DB954;--gd:#15883C;--gl:#E8F8EE;--bk:#0D0D0D;--bg:#F2F3F5;--sf:#fff;--bd:#E8E9EC;--t1:#0D0D0D;--t2:#555E6B;--t3:#9AA0AB;--fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--fm:'DM Mono',monospace;--sh:0 1px 4px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.04)}
        body{font-family:var(--fb);background:var(--bg);color:var(--t1);font-size:13px;line-height:1.5}
        .wrap{max-width:1080px;margin:0 auto;padding:20px 16px 40px}
        .g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
        .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
        .col{display:flex;flex-direction:column;gap:12px}
        
        /* Estilos de Tabs y Headers (los que ya tenías) */
        .tab-nav{display:flex;gap:4px;margin-bottom:16px;background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:5px;width:fit-content}
        .tab-btn{display:flex;align-items:center;gap:7px;padding:7px 18px;border-radius:8px;border:none;background:transparent;font-family:var(--fb);font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;transition:all .18s;white-space:nowrap}
        .tab-btn.active{background:var(--bk);color:#fff}
        .tab-dot{width:7px;height:7px;border-radius:50%;background:var(--t3);flex-shrink:0}
        .tab-btn.active .tab-dot{background:var(--g)}
        .tab-panel{display:none}
        .tab-panel.active{display:block;animation:fadeUp .3s ease}

        /* --- MODAL V5 --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            display: none; align-items: center; justify-content: center; z-index: 10000;
        }
        .modal-content {
            background: var(--sf); padding: 24px; border-radius: 16px; width: 90%; max-width: 500px;
            position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .close-modal {
            position: absolute; top: 15px; right: 20px; font-size: 24px;
            cursor: pointer; color: var(--t3);
        }
        #textoReporte {
            background: var(--bg); padding: 15px; border-radius: 8px;
            font-family: var(--fm); font-size: 11px; white-space: pre-wrap;
            margin: 15px 0; border: 1px solid var(--bd); max-height: 300px; overflow-y: auto;
        }

        /* --- HISTORIAL V5 --- */
        .hist-v5 {
            margin-top: 24px; background: var(--sf); border: 1px solid var(--bd);
            border-radius: 12px; padding: 20px; box-shadow: var(--sh);
        }
        .htbl { width: 100%; border-collapse: collapse; font-size: 12px; }
        .htbl th { text-align: left; padding: 8px; color: var(--t3); border-bottom: 1px solid var(--bd); font-size: 10px; text-transform: uppercase; }
        .htbl td { padding: 10px 8px; border-bottom: 1px solid #f5f5f5; }

        /* Otros estilos necesarios de tu código original (abreviados por espacio) */
        .hdr{background:var(--bk);border-radius:16px;padding:20px 24px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;color:white}
        .kgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-bottom:12px}
        .kpi{background:var(--sf);border-radius:12px;padding:14px;border-top:3px solid var(--kc);box-shadow:var(--sh)}
        .kpi-v{font-family:var(--fh);font-size:28px;font-weight:800}
        .thdr{background:var(--bk);border-radius:16px;padding:18px 22px;margin-bottom:12px;color:white}
        .tkr{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:12px}
        .tkpi{background:var(--sf);border-radius:12px;padding:12px 14px;border-left:3px solid var(--tc);box-shadow:var(--sh)}
        .kedit{border:none;border-bottom:2px solid var(--tc);font-size:26px;font-weight:800;width:60px;outline:none;background:transparent}
        .fta{width:100%;border:1px solid var(--bd);border-radius:8px;padding:10px;font-family:var(--fb);resize:vertical}
        .btns, .btnp { cursor: pointer; transition: 0.2s; }
        .btnp:active { transform: scale(0.98); }
        @media(max-width:720px){.kgrid,.tkr{grid-template-columns:1fr 1fr}.g2,.g3{grid-template-columns:1fr}}
    </style>
</head>
<body>

<div class="wrap">
    <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('dashboard', this)"><span class="tab-dot"></span>Dashboard NOC</button>
        <button class="tab-btn" onclick="switchTab('turno', this)"><span class="tab-dot"></span>Entrega de Turno</button>
        <button class="tab-btn" onclick="switchTab('registro', this)"><span class="tab-dot"></span>Registro & Analítica</button>
    </div>

    <div class="tab-panel active" id="panel-dashboard">
        <div class="hdr">
            <div><h2 class="brand">FIBRA<span>ZO</span> — NOC</h2></div>
            <div id="liveClock">--:--:--</div>
        </div>
        <div class="kgrid">
            <div class="kpi" style="--kc:#EF9F27">Tickets ODOO<div class="kpi-v">11</div></div>
            <div class="kpi" style="--kc:#EF4444">Canales TV<div class="kpi-v">4</div></div>
            <div class="kpi" style="--kc:#EF4444">BitNinja<div class="kpi-v">2</div></div>
            <div class="kpi" style="--kc:#1DB954">MOPs<div class="kpi-v">1</div></div>
            <div class="kpi" style="--kc:#3B82F6">Liberty<div class="kpi-v">1</div></div>
        </div>
    </div>

    <div class="tab-panel" id="panel-turno">
        <div class="thdr">
            <div style="display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:15px;">
                <div><h3>Entrega de <span>Turno</span></h3><p style="font-size:11px;opacity:0.6">Registro oficial de novedades</p></div>
                <div style="display:flex; gap:10px;">
                    <select class="fta" id="sel-ing" style="width:160px">
                        <option value="">Ingeniero...</option>
                        <option>Jhon Lopez</option>
                        <option>Joseph Montenegro</option>
                        <option>Jack Osma</option>
                    </select>
                    <select class="fta" id="sel-turno" style="width:140px">
                        <option>06:00 - 12:00</option>
                        <option>12:00 - 18:00</option>
                        <option>18:00 - 00:00</option>
                    </select>
                    <input type="date" class="fta" id="sel-fecha" style="width:140px">
                </div>
            </div>
        </div>

        <div class="tkr">
            <div class="tkpi" style="--tc:#EF9F27">Issues<br><input class="kedit" type="number" value="2" id="kpi-issues"></div>
            <div class="tkpi" style="--tc:#EF4444">Bandeja<br><input class="kedit" type="number" value="49" id="kpi-bandeja"></div>
            <div class="tkpi" style="--tc:#3B82F6">TV Down<br><input class="kedit" type="number" value="4" id="kpi-tv"></div>
            <div class="tkpi" style="--tc:#1DB954">MOPs<br><input class="kedit" type="number" value="0" id="kpi-mops"></div>
        </div>

        <div class="card" style="margin-bottom:12px; border:2px solid var(--g)">
            <div class="cb" style="background:white; padding:20px;">
                <div class="g2">
                    <div>
                        <label style="font-size:10px; font-weight:700; color:var(--t3)">ESTADO DEL TURNO</label>
                        <div style="display:flex; gap:10px; margin:10px 0;">
                            <label><input type="radio" name="estado" value="🟢 TURNO LIMPIO" checked> Limpio</label>
                            <label><input type="radio" name="estado" value="🟡 CON PENDIENTES"> Pendientes</label>
                            <label><input type="radio" name="estado" value="🔴 ALERTA ACTIVA"> Alerta</label>
                        </div>
                        <label style="font-size:10px; font-weight:700; color:var(--t3)">PRIORIDADES DE RELEVO</label>
                        <textarea id="prioridadesRelevo" class="fta" style="min-height:80px; margin-top:5px" placeholder="Tickets críticos para entregar..."></textarea>
                    </div>
                    <div>
                        <label style="font-size:10px; font-weight:700; color:var(--t3)">NOVEDADES GENERALES (WhatsApp)</label>
                        <textarea id="novedadesGenerales" class="fta" style="min-height:135px; border:2px solid var(--g); margin-top:5px" placeholder="Escribe aquí los detalles que irán al reporte..."></textarea>
                    </div>
                </div>
                
                <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px; padding-top:15px; border-top:1px solid var(--bd)">
                    <button class="btns" onclick="limpiarForm()" style="padding:10px 20px; border-radius:8px; border:1px solid var(--bd)">Limpiar</button>
                    <button class="btnp" onclick="generarReporteV5()" style="padding:10px 30px; border-radius:8px; background:var(--bk); color:white; font-weight:700">✓ GENERAR REPORTE</button>
                </div>
            </div>
        </div>

        <div class="hist-v5">
            <h4 style="font-family:var(--fh); font-size:14px; margin-bottom:15px;">📂 HISTORIAL DE ENTREGAS RECIENTES</h4>
            <table class="htbl">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Ingeniero</th>
                        <th>Turno</th>
                        <th>Resumen Métricas</th>
                    </tr>
                </thead>
                <tbody id="cuerpoHistorial">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="tab-panel" id="panel-registro">
        <div class="g2">
            <div class="card"><div class="cb"><canvas id="chart-h" height="200"></canvas></div></div>
            <div class="card"><div class="cb"><canvas id="chart-t" height="200"></canvas></div></div>
        </div>
    </div>
</div>

<div id="modalReporte" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="cerrarModal()">×</span>
        <h3 style="font-family:var(--fh)">REPORTE WHATSAPP</h3>
        <div id="textoReporte"></div>
        <button id="btnCopiar" onclick="copiarReporte()" style="width:100%; padding:12px; background:var(--g); color:white; border:none; border-radius:8px; font-weight:700; cursor:pointer">
            Copiar al Portapapeles
        </button>
    </div>
</div>

<script>
    // --- LÓGICA V5 ---
    let historial = JSON.parse(localStorage.getItem('historialNOC')) || [];

    function switchTab(tab, btn) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('panel-' + tab).classList.add('active');
        btn.classList.add('active');
        if(tab === 'registro') setTimeout(initCharts, 100);
    }

    function generarReporteV5() {
        const ing = document.getElementById('sel-ing').value;
        if(!ing) { alert("Por favor selecciona un ingeniero"); return; }

        const fecha = document.getElementById('sel-fecha').value || new Date().toLocaleDateString();
        const turno = document.getElementById('sel-turno').value;
        const estado = document.querySelector('input[name="estado"]:checked').value;
        const prioridades = document.getElementById('prioridadesRelevo').value || "Ninguna";
        const novedades = document.getElementById('novedadesGenerales').value || "Sin novedades adicionales.";
        
        // Métricas
        const issues = document.getElementById('kpi-issues').value;
        const bandeja = document.getElementById('kpi-bandeja').value;
        const tv = document.getElementById('kpi-tv').value;
        const mops = document.getElementById('kpi-mops').value;

        const reporte = `*ENTREGA DE TURNO NOC*
Ingeniero: ${ing}
Turno: ${turno}
Fecha: ${fecha}
Estado: ${estado}

*MÉTRICAS:*
Issues: ${issues}
Bandeja Odoo: ${bandeja}
TV Down: ${tv}
MOPs: ${mops}

*PRIORIDADES:*
${prioridades}

*NOVEDADES GENERALES:*
${novedades}

_Generado a las ${new Date().toLocaleTimeString()}_`;

        document.getElementById('textoReporte').innerText = reporte;
        document.getElementById('modalReporte').style.display = "flex";

        // Guardar en historial
        const nuevoRegistro = { fecha, ing, turno, resumen: `I:${issues} | B:${bandeja} | TV:${tv}` };
        historial.unshift(nuevoRegistro);
        if(historial.length > 10) historial.pop();
        localStorage.setItem('historialNOC', JSON.stringify(historial));
        renderHistorial();
    }

    function copiarReporte() {
        const texto = document.getElementById('textoReporte').innerText;
        navigator.clipboard.writeText(texto).then(() => {
            const btn = document.getElementById('btnCopiar');
            btn.innerText = "¡COPIADO!";
            setTimeout(() => {
                cerrarModal();
                btn.innerText = "Copiar al Portapapeles";
            }, 1200);
        });
    }

    function cerrarModal() {
        document.getElementById('modalReporte').style.display = "none";
    }

    function renderHistorial() {
        const cuerpo = document.getElementById('cuerpoHistorial');
        cuerpo.innerHTML = historial.map(h => `
            <tr>
                <td>${h.fecha}</td>
                <td><strong>${h.ing}</strong></td>
                <td>${h.turno}</td>
                <td style="font-family:var(--fm); color:var(--gd)">${h.resumen}</td>
            </tr>
        `).join('');
    }

    function limpiarForm() {
        if(confirm("¿Limpiar todo el formulario?")) {
            document.getElementById('prioridadesRelevo').value = "";
            document.getElementById('novedadesGenerales').value = "";
            document.getElementById('sel-ing').value = "";
        }
    }

    // --- RELLENO DE RELOJ Y GRÁFICOS ---
    setInterval(() => {
        document.getElementById('liveClock').innerText = new Date().toLocaleTimeString();
    }, 1000);

    function initCharts() {
        // Chart Horas
        new Chart(document.getElementById('chart-h'), {
            type: 'bar',
            data: {
                labels: ['Jhon', 'Joseph', 'Jack'],
                datasets: [{ label: 'Horas Turno', data: [120, 150, 80], backgroundColor: '#1DB954' }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
        // Chart Turnos
        new Chart(document.getElementById('chart-t'), {
            type: 'doughnut',
            data: {
                labels: ['Mañana', 'Tarde', 'Noche'],
                datasets: [{ data: [40, 35, 25], backgroundColor: ['#1DB954', '#3B82F6', '#EF4444'] }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    window.onload = () => {
        renderHistorial();
        // Set fecha de hoy por defecto
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('sel-fecha').value = today;
    };
</script>

</body>
</html>Actualización V5: Historial y Novedades
